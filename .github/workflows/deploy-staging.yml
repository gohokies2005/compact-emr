name: Deploy staging
concurrency:
  group: deploy-staging
  cancel-in-progress: false


on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: us-east-1
      - run: npm ci
      - run: npm run db:generate -w backend
      - run: npm run cdk:synth:staging
      # veteran_theory_ai_enabled=true is STAGING-ONLY (Ryan 2026-07-11: "i need to test it") — Part B
      # ships dark by default; this turns it ON for staging so it can be exercised on the physician page.
      # Display-only + drafter-isolated, so this cannot affect a letter. Prod (deploy-prod.yml) does NOT
      # pass it → prod stays dark until deliberately flipped. Drop this flag to turn staging back to dark.
      - run: npm run cdk -w infra -- deploy --all --require-approval never --context env=staging --context veteran_theory_ai_enabled=true

      - name: Apply database migrations
        run: |
          set -e
          # Use start-build (current project config), NOT retry-build (replays the old buildspec).
          BUILD_ID=$(aws codebuild start-build --project-name compact-emr-staging-prisma-migrate-deploy --region us-east-1 --query 'build.id' --output text)
          echo "Started migration build: $BUILD_ID"
          while true; do
            STATUS=$(aws codebuild batch-get-builds --ids "$BUILD_ID" --region us-east-1 --query 'builds[0].buildStatus' --output text)
            echo "Migration build status: $STATUS"
            case "$STATUS" in
              SUCCEEDED) echo "::notice::Database migrations applied"; break ;;
              FAILED|FAULT|STOPPED|TIMED_OUT) echo "::error::Migration build $STATUS"; exit 1 ;;
              *) sleep 15 ;;
            esac
          done

      - run: npm run build -w frontend
        env:
          VITE_AWS_REGION: ${{ secrets.VITE_AWS_REGION }}
          VITE_COGNITO_USER_POOL_ID: ${{ secrets.VITE_COGNITO_USER_POOL_ID }}
          VITE_COGNITO_CLIENT_ID: ${{ secrets.VITE_COGNITO_CLIENT_ID }}
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}
          VITE_USE_MOCK_API: ${{ secrets.VITE_USE_MOCK_API }}
      - name: Read frontend stack outputs
        id: frontend_outputs
        run: |
          FRONTEND_BUCKET=$(aws cloudformation describe-stacks --stack-name compact-emr-staging-frontend --query "Stacks[0].Outputs[?OutputKey=='FrontendBucketName'].OutputValue" --output text)
          DISTRIBUTION_ID=$(aws cloudformation describe-stacks --stack-name compact-emr-staging-frontend --query "Stacks[0].Outputs[?OutputKey=='DistributionId'].OutputValue" --output text)
          echo "frontend_bucket=$FRONTEND_BUCKET" >> "$GITHUB_OUTPUT"
          echo "distribution_id=$DISTRIBUTION_ID" >> "$GITHUB_OUTPUT"
      # Cache strategy (fixes stale-UI-after-deploy): hashed assets are content-addressed so they're
      # immutable for a year; index.html (+ any non-hashed root file) MUST be no-cache so browsers always
      # revalidate and pick up the new asset hashes. Previously the single sync set no Cache-Control, so
      # browsers heuristically cached index.html → users kept loading the OLD JS bundle across deploys.
      - name: Sync hashed assets (immutable, 1yr)
        run: aws s3 sync frontend/dist/assets s3://${{ steps.frontend_outputs.outputs.frontend_bucket }}/assets --delete --cache-control "public,max-age=31536000,immutable"
      - name: Sync index.html + root files (always revalidate)
        run: aws s3 sync frontend/dist s3://${{ steps.frontend_outputs.outputs.frontend_bucket }} --delete --exclude "assets/*" --cache-control "no-cache"
      - run: aws cloudfront create-invalidation --distribution-id ${{ steps.frontend_outputs.outputs.distribution_id }} --paths "/*"
      - name: Smoke test - Lambda cold start
        run: |
          set -e
          # Scope to the API Lambda ONLY — the api stack now also has a letter-render Lambda, and the
          # unscoped query returned BOTH names (tab-separated) → `lambda invoke` rejected it → false
          # "Deploy staging" failure on a healthy deploy (2026-06-18). Filter by the API construct's logical id.
          FN_NAME=$(aws cloudformation describe-stack-resources --stack-name compact-emr-staging-api --query "StackResources[?ResourceType=='AWS::Lambda::Function' && starts_with(LogicalResourceId, 'PlaceholderApiLambda')].PhysicalResourceId" --output text)
          echo "Lambda function: $FN_NAME"
          PAYLOAD='{"version":"2.0","routeKey":"GET /api/v1/health","rawPath":"/api/v1/health","headers":{},"requestContext":{"http":{"method":"GET","path":"/api/v1/health"}},"isBase64Encoded":false}'
          aws lambda invoke --function-name "$FN_NAME" --payload "$PAYLOAD" --cli-binary-format raw-in-base64-out /tmp/lambda-out.json > /tmp/lambda-invoke-meta.json
          echo "Invoke metadata:"
          cat /tmp/lambda-invoke-meta.json
          echo ""
          echo "Lambda response:"
          cat /tmp/lambda-out.json
          echo ""
          # Pass if no errorType in response (init crash); statusCode present means handler executed
          if grep -q 'errorType' /tmp/lambda-out.json; then
            echo "::error::Lambda init error - check logs"
            exit 1
          fi
          echo "::notice::Lambda boots cleanly (no init error)"
