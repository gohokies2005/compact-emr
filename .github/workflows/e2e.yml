name: E2E (live site)

# Runs the Playwright RN-workflow smoke test against the deployed site after a
# successful staging deploy. workflow_run fires when "Deploy staging" completes;
# the job guard ensures we only run when that deploy actually succeeded.
on:
  workflow_run:
    workflows: ["Deploy staging"]
    types: [completed]

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Only run when the upstream deploy concluded successfully.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run E2E
        run: npx playwright test
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_TOTP_SECRET: ${{ secrets.E2E_TOTP_SECRET }}
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
