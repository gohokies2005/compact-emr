name: E2E (live site)

# DISABLED 2026-06-05: this Playwright live-site smoke test was failing on every staging deploy
# (missing/invalid E2E_* secrets) and emailing the repo owner on each failure — dozens/day. Auto-run
# is OFF (manual-only via "Run workflow") so it stops spamming. To re-enable after fixing the
# E2E_BASE_URL / E2E_USERNAME / E2E_PASSWORD / E2E_TOTP_SECRET repo secrets, restore the
# `workflow_run` trigger below:
#   on:
#     workflow_run:
#       workflows: ["Deploy staging"]
#       types: [completed]
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  e2e:
    runs-on: ubuntu-latest
    # Only run when the upstream deploy concluded successfully.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run E2E
        run: npx playwright test
        env:
          E2E_BASE_URL: ${{ secrets.E2E_BASE_URL }}
          E2E_USERNAME: ${{ secrets.E2E_USERNAME }}
          E2E_PASSWORD: ${{ secrets.E2E_PASSWORD }}
          E2E_TOTP_SECRET: ${{ secrets.E2E_TOTP_SECRET }}
      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
