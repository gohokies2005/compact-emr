name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run db:generate
      - run: npm run lint

      - run: npm run lint -w frontend
      - run: npm run typecheck -w frontend
      - run: npm run test -w frontend
      - run: npm run typecheck
      - run: npm run migrate:check
      - run: npm run migrate:diff-check
      - run: npm test
      - run: npm run cdk:synth:staging
